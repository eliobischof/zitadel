name: Release

on:
  workflow_call:
    inputs:
      semantic_version:
        required: true
        type: string
      build_image_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      google_image_name:
        required: true
        type: string

jobs:
  version:
    uses: ./.github/workflows/version.yml
    with:
      semantic_version: ${{ inputs.semantic_version }}
      dry_run: false

  publish:
    runs-on: ubuntu-latest
    needs:
      - version
    steps:
    - name: publish latest release
      run: |
        RELEASE_URL=$(
          curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/eliobischof/zitadel/releases/tags/${{ needs.version.outputs.version }} | \
            jq -r '.url')
        curl -L -X PATCH \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "${RELEASE_URL}" \
          -d '{"make_latest": "legacy"}'
